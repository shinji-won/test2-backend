name: CI/CD Pipeline to AWS EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 다운로드
      - name: Checkout source code
        uses: actions/checkout@v3

      # 2. AWS 자격증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 3. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 4. Docker 이미지 빌드 & ECR로 푸시
      #    태그는 latest 대신 커밋 SHA 사용 -> 매 배포마다 고유한 이미지가 되어
      #    Kubernetes가 변경을 확실히 인식하고 롤링 업데이트를 수행함
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: test-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. kubeconfig 설정 (클러스터 이름 수정됨: test-be-real-success)
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ap-northeast-2 --name test-be-real-success

      # 6. MySQL 적용 (자주 안 바뀌지만 매번 apply해도 안전함 - idempotent)
      - name: Apply MySQL
        run: |
          kubectl apply -f k8s/mysql.yaml

      # 7. 백엔드 Deployment + Service 적용 - 이미지 URI를 새로 빌드한 것으로 치환해서 apply
      - name: Apply backend with new image
        env:
          ECR_IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          envsubst < k8s/backend.yaml | kubectl apply -f -

      # 8. 롤아웃 완료까지 대기 (실패하면 워크플로우도 실패로 표시됨)
      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/test-backend-deployment -n default --timeout=180s

      - name: Deployment Complete
        run: |
          echo "🚀 EKS 배포 완료!"
          echo "Image: ${{ steps.build-image.outputs.image_uri }}"
