apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: test-be-office
  region: ap-northeast-2
  version: "1.30"

vpc:
  cidr: "10.0.0.0/16"

managedNodeGroups:
  - name: ng-general
    instanceTypes: ["t3.small"]
    desiredCapacity: 1
    minSize: 1
    maxSize: 2
    volumeSize: 50
    ssh:
      allow: false
    iam:
      withAddonPolicies:
        autoScaler: true
        ebs: true
        cloudWatch: true