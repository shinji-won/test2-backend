name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 로봇이 내 코드 다운로드하기
    - name: Checkout source code
      uses: actions/checkout@v3

    # 2. AWS 자격증명 설정 (금고에서 열쇠 꺼내 쓰기)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 3. AWS ECR 냉장고 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 4. 도커 이미지 빌드하고 ECR 냉장고에 슛! (Push)
    #    배포(kubectl apply)는 더 이상 여기서 하지 않음 - ArgoCD가 클러스터 상태를 감시하다가
    #    자동으로 동기화함 (GitOps 방식)
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: test-backend
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Build Complete
      run: |
        echo "이미지 빌드 및 ECR 푸시 완료!"
        echo "배포는 ArgoCD가 자동으로 감지해서 처리합니다."